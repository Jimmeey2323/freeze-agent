<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freeze Concierge</title>
    <meta http-equiv="refresh" content="0; url=./public/index.html" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .card {
        width: min(92vw, 560px);
        padding: 32px;
        border-radius: 24px;
        background: white;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
      }

      a {
        color: #2563eb;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Opening Freeze Concierge…</h1>
      <p>
        If you’re seeing this page from a simple project preview, you’ll be redirected to the app interface automatically.
      </p>
      <p>
        If redirecting stalls, open <a href="./public/index.html">the interface directly</a> or use the local app at <a href="http://localhost:3002">http://localhost:3002</a>.
      </p>
    </main>
  </body>
</html>
